services:
  - type: web
    name: contesthive-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        fromDatabase:
          name: contesthive-db
          property: connectionString
      - key: ADMIN_PIN
        value: 1234
      - key: GEMINI_API_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://contesthive-frontend.onrender.com

databases:
  - name: contesthive-db
    databaseName: contesthive
    user: contesthive_user
